# EdSys Share: fresh host-native root-level file share.
[EdSys-Share]
   path = /EdSys-Share
   browseable = yes
   read only = no
   guest ok = no
   valid users = jeremy
   create mask = 0660
   force create mode = 0660
   directory mask = 0770
   force directory mode = 0770
   store dos attributes = yes
   follow symlinks = no
   wide links = no
   smb encrypt = required
   root preexec = /usr/local/libexec/edsys-share/edsys-share-mount-check
   root preexec close = yes
