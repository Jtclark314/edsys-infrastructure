# EdSys Share: fresh host-native root-level file share.
[EdSys-Share]
   path = /EdSys-Share
   available = yes
   browseable = yes
   printable = no
   max connections = 0
   server addresses =
   msdfs root = no
   msdfs proxy =
   magic script =
   magic output =
   read only = no
   guest ok = no
   guest only = no
   valid users = jeremy edsys-share-dell
   invalid users =
   admin users =
   force user = jeremy
   force group =
   read list =
   write list =
   veto files =
   vfs objects =
   preexec =
   postexec =
   root postexec =
   create mask = 0660
   force create mode = 0660
   directory mask = 0770
   force directory mode = 0770
   store dos attributes = yes
   follow symlinks = no
   wide links = no
   smb encrypt = required
   root preexec = /usr/local/libexec/edsys-share/edsys-share-mount-check-smb
   root preexec close = yes
