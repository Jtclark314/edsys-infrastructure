# Docker Compose service template.
# Replace placeholders before use. Do not commit real secrets.

services:
  service-name:
    image: example/image:latest
    container_name: service-name
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: service-name
