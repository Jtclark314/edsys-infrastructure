services:
  anythingllm:
    image: mintplexlabs/anythingllm@sha256:2be879706ac122c5e75fdb7c2ae3b60881c606445a4e8bbd1034e08c4aac386d
    container_name: anythingllm
    restart: unless-stopped
    networks: [ai-net]
    ports:
      - "127.0.0.1:3002:3001"
      - "192.168.50.50:3002:3001"
    volumes:
      - /mnt/ai-store/anythingllm:/app/server/storage
      - /mnt/ai-store/rag/docs/EdSysVault_RAG:/obsidian:ro
    env_file:
      - /etc/edsys-secrets/openai.env
      - /etc/edsys-secrets/anythingllm-litellm.env
    environment:
      STORAGE_DIR: /app/server/storage
      UID: "1000"
      GID: "1000"
      OLLAMA_BASE_PATH: http://ollama:11434
      OLLAMA_MODEL_PREF: gemma4:26b

networks:
  ai-net:
    external: true
