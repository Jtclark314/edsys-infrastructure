version: 1
host: 9950x
docker_wait_seconds: 90
cooldown_seconds: 300
maintenance_flag: /run/edsys/container-recovery.disabled
notification_url_file: /etc/edsys-container-recovery/notify-url
required_mounts:
  - /mnt/data-500g

tiers:
  - name: operator-visibility
    blocking: true
    projects:
      - name: 9950x-core
        files:
          - /srv/edsys/edsys-infrastructure/docker/9950x-core/compose.yaml
        services: [portainer]
        healthchecks:
          - url: http://127.0.0.1:9000/
            codes: [200]
      - name: homepage
        files: [/srv/homepage/docker-compose.yml]
        services: [homepage]
        healthchecks:
          - url: http://192.168.50.50:3005/api/services
            codes: [200]
      - name: homepage-workhorse
        files: [/srv/edsys/edsys-infrastructure/docker/homepage-workhorse/compose.yaml]
        services: [homepage-workhorse]
        healthchecks:
          - url: http://127.0.0.1:3019/api/services
            codes: [200]
      - name: uptime-kuma
        files: [/home/jeremy/stacks/uptime-kuma/docker-compose.yml]
        services: [uptime-kuma]
        healthchecks:
          - url: http://127.0.0.1:3001/dashboard
            codes: [200, 302]
      - name: edsys-control-api
        files: [/srv/edsys/edsys-infrastructure/docker/edsys-control-api/compose.yaml]
        services: [edsys-control-api]
        healthchecks:
          - url: http://127.0.0.1:8099/
            codes: [200, 404]

  - name: shared-foundations
    blocking: true
    required_mounts: [/mnt/ai-store]
    projects:
      - name: ai
        files: [/srv/edsys/edsys-infrastructure/docker/9950x-ai/compose.yaml]
        services: [ollama, qdrant, infinity, piper, whisper, wyoming-openwakeword]
        wait_timeout_seconds: 300
        healthchecks:
          - url: http://127.0.0.1:11434/api/tags
            codes: [200]
          - url: http://127.0.0.1:6333/readyz
            codes: [200]
          - url: http://127.0.0.1:7997/health
            codes: [200, 404]
      - name: 9950x-workhorse
        files: [/srv/edsys/edsys-infrastructure/docker/9950x-workhorse/compose.yaml]
        services:
          - healthchecks-db
          - healthchecks
          - litellm-db
          - langfuse-postgres
          - langfuse-redis
          - langfuse-clickhouse
          - langfuse-minio
          - karakeep-meilisearch
          - searxng-redis
          - loki
          - alloy
          - ntfy
          - crowdsec
          - dozzle
          - scrutiny
          - backrest
        wait_timeout_seconds: 300
        healthchecks:
          - url: http://127.0.0.1:3014/
            codes: [200, 302]
          - url: http://192.168.50.50:3100/ready
            codes: [200]
          - url: http://192.168.50.50:3015/v1/health
            codes: [200]
      - name: n8n
        files:
          - /home/jeremy/stacks/n8n/docker-compose.yml
          - /home/jeremy/stacks/n8n/docker-compose.override.yml
        services: [postgres]
      - name: sentinel
        files: [/opt/stacks/sentinel/docker-compose.yml]
        services: [postgres, redis, minio]
      - name: edsys-finance
        files: [/srv/edsys-finance/docker-compose.yml]
        services: [db]
      - name: spending-ledger
        files: [/srv/ssd1/docker/stacks/spending-ledger/docker-compose.yml]
        services: [spending-db]
      - name: penpot
        files: [/mnt/data-500g/docker/stacks/penpot/docker-compose.yml]
        services: [penpot-postgres, penpot-valkey, penpot-mailcatch]

  - name: primary-services
    blocking: true
    required_mounts: [/mnt/media]
    projects:
      - name: 9950x-core
        files: [/srv/edsys/edsys-infrastructure/docker/9950x-core/compose.yaml]
        services: [plex, tautulli]
        healthchecks:
          - url: http://127.0.0.1:32400/identity
            codes: [200]
          - url: http://127.0.0.1:8181/status
            codes: [200]
      - name: jellyfin
        files: [/home/jeremy/stacks/jellyfin/docker-compose.yml]
        services: [jellyfin]
        healthchecks:
          - url: http://127.0.0.1:8096/health
            codes: [200]
      - name: frigate
        files: [/opt/stacks/frigate/docker-compose.yml]
        services: [frigate]
        wait_timeout_seconds: 300
        healthchecks:
          - url: http://127.0.0.1:5000/
            codes: [200]
      - name: wyze-bridge
        files: [/home/jeremy/wyze-bridge/docker-compose.yml]
        services: [wyze-bridge]
        healthchecks:
          - url: http://127.0.0.1:5010/
            codes: [200, 302]
      - name: audiobookshelf
        files: [/srv/ssd1/docker/stacks/audiobookshelf/docker-compose.yml]
        services: [audiobookshelf]
        healthchecks:
          - url: http://127.0.0.1:13378/
            codes: [200]
      - name: 9950x-workhorse
        files: [/srv/edsys/edsys-infrastructure/docker/9950x-workhorse/compose.yaml]
        services: [litellm, langfuse-worker, langfuse, karakeep-chrome, karakeep, searxng]
        wait_timeout_seconds: 300
        healthchecks:
          - url: http://192.168.50.50:4000/health/liveliness
            codes: [200]
          - url: http://192.168.50.50:3012/api/public/health
            codes: [200]
          - url: http://192.168.50.50:3017/
            codes: [200]
      - name: n8n
        files:
          - /home/jeremy/stacks/n8n/docker-compose.yml
          - /home/jeremy/stacks/n8n/docker-compose.override.yml
        services: [n8n]
        healthchecks:
          - url: http://127.0.0.1:5678/
            codes: [200]
      - name: edsys-metrics-agent
        files: [/opt/edsys-metrics-agent/docker-compose.yml]
        services: [telegraf]

  - name: dependent-applications
    blocking: false
    projects:
      - name: 9950x-core
        files: [/srv/edsys/edsys-infrastructure/docker/9950x-core/compose.yaml]
        services: [openwebui]
        healthchecks:
          - url: http://127.0.0.1:3000/health
