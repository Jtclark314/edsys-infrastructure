            codes: [200]
      - name: edsys-ai-gateway
        files: [/home/jeremy/code/foothills-project-portal/edsys-ai-gateway/docker-compose.yml]
        services: [edsys-ai-gateway]
        healthchecks:
          - url: http://127.0.0.1:8020/health
            codes: [200]
      - name: gateway
        files: [/srv/edsys/edsys-infrastructure/docker/edsys-glasses-gateway/compose.yaml]
        services: [edsys-glasses-gateway]
        healthchecks:
          - url: http://127.0.0.1:8015/health
            codes: [200]
      - name: edsys-portal
        files: [/mnt/data-500g/stacks/edsys-portal/docker-compose.yml]
        services: [edsys-portal]
        healthchecks:
          - url: http://127.0.0.1:3010/
            codes: [200]
      - name: edsys-finance
        files: [/srv/edsys-finance/docker-compose.yml]
        services: [api, web]
